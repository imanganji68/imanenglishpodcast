<style>
  :root{
    color-scheme: light;
    --cream:#F8F1E6;
    --cream-2:#F1E7D6;
    --card:#FFFFFF;
    --navy:#11233F;
    --navy-soft:#4A5A78;
    --muted:#8A8A78;
    --gold:#C8901D;
    --gold-soft:rgba(200,144,29,0.13);
    --gold-line:rgba(200,144,29,0.4);
    --green:#2F5750;
    --green-soft:rgba(47,87,80,0.12);
    --purple:#4F3972;
    --purple-soft:rgba(79,57,114,0.12);
    --line:rgba(17,35,63,0.10);
    --line-strong:rgba(17,35,63,0.18);
    --shadow:0 10px 28px rgba(17,35,63,0.09);
    --shadow-sm:0 2px 10px rgba(17,35,63,0.06);
    --radius:18px;
    --radius-sm:13px;
    --danger:#B3492F;
    --sat:env(safe-area-inset-top,0px);
    --sab:env(safe-area-inset-bottom,0px);
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--cream);
    color:var(--navy);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  button,input,select,textarea{font:inherit;color:inherit;}
  button{border:0;cursor:pointer;background:none;}
  input,select{background:var(--card);border:1px solid var(--line-strong);border-radius:10px;outline:none;}
  input:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft);}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-thumb{background:rgba(17,35,63,0.18);border-radius:999px;}
  svg{display:block;}
  .icon{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}

  #player{position:fixed;width:1px;height:1px;left:-9999px;top:0;opacity:0;pointer-events:none;}

  #app{height:100%;}
  .shell{height:100%;display:grid;grid-template-rows:auto 1fr auto auto;}

  /* ---------- Header ---------- */
  .topbar{
    padding:calc(var(--sat) + 10px) 16px 10px 16px;
    background:var(--cream);
    border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .brand{display:flex;align-items:center;gap:9px;min-width:0;}
  .brand-mark{
    width:34px;height:34px;border-radius:10px;flex-shrink:0;
    background:linear-gradient(155deg,var(--navy),#1c3258);
    display:flex;align-items:center;justify-content:center;
    box-shadow:var(--shadow-sm);
  }
  .brand-mark .icon{width:18px;height:18px;stroke:var(--gold);}
  .brand-text{min-width:0;}
  .brand-title{font-size:15px;font-weight:700;letter-spacing:-0.01em;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .brand-title b{color:var(--gold);font-weight:700;}
  .brand-sub{font-size:10.5px;color:var(--muted);letter-spacing:0.10em;text-transform:uppercase;margin-top:1px;}

  /* ---------- Main ---------- */
  .main{min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .main.no-scroll{overflow:hidden;}
  @media (min-width:760px){
    .shell{max-width:520px;margin:0 auto;box-shadow:0 0 60px rgba(17,35,63,0.10);}
  }

  /* ---------- Home page ---------- */
  .home{height:100%;display:flex;flex-direction:column;min-height:0;}
  .now-row{padding:14px 16px 10px;flex-shrink:0;}
  .level-pill{
    display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
    padding:4px 10px;border-radius:999px;letter-spacing:0.02em;
  }
  .lvl-elementary{background:var(--green-soft);color:var(--green);}
  .lvl-intermediate{background:var(--gold-soft);color:var(--gold);}
  .lvl-upper_intermediate{background:var(--purple-soft);color:var(--purple);}
  .now-title{font-size:19px;font-weight:700;margin-top:8px;line-height:1.25;letter-spacing:-0.01em;}
  .now-meta{font-size:12.5px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px;}

  .transcript-wrap{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2px 10px 14px;}
  .cue{
    display:block;width:100%;text-align:left;padding:9px 12px;border-radius:12px;margin-bottom:3px;
    border-left:3px solid transparent;transition:background 0.15s;
  }
  .cue:active{background:var(--cream-2);}
  .cue.active{background:var(--gold-soft);border-left-color:var(--gold);}
  .cue.shadow{background:var(--green-soft);border-left-color:var(--green);}
  .cue-time{font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums;margin-bottom:2px;}
  .cue.active .cue-time{color:var(--gold);font-weight:600;}
  .cue.shadow .cue-time{color:var(--green);font-weight:600;}
  .cue-text{font-size:15px;line-height:1.55;color:var(--navy-soft);user-select:text;-webkit-user-select:text;cursor:text;}
  .cue.active .cue-text{color:var(--navy);font-weight:600;}
  .cue.shadow .cue-text{color:var(--navy);font-weight:600;}

  .empty-pane{margin:6px 6px 0;padding:26px 18px;background:var(--card);border-radius:var(--radius);
    border:1px dashed var(--line-strong);text-align:center;color:var(--muted);font-size:13px;line-height:1.6;}
  .empty-pane .icon{width:30px;height:30px;color:var(--muted);margin:0 auto 10px;}

  /* ---------- Tools (sticky bottom of Home) ---------- */
  .tools{
    flex-shrink:0;background:var(--card);border-top:1px solid var(--line);
    padding:12px 16px calc(10px + var(--sab));
    box-shadow:0 -8px 24px rgba(17,35,63,0.06);
  }
  .progress-row{position:relative;}
  .progress-track{
    position:relative;height:10px;background:var(--cream-2);border-radius:5px;cursor:pointer;
    touch-action:none;margin:4px 0;
  }
  .progress-fill{position:absolute;left:0;top:0;height:100%;background:var(--gold);border-radius:5px;}
  .progress-thumb{
    position:absolute;top:50%;transform:translate(-50%,-50%);
    width:18px;height:18px;border-radius:50%;background:var(--gold);box-shadow:0 1px 4px rgba(0,0,0,0.25);
    pointer-events:none;transition:transform 0.1s;
  }
  .progress-track:active .progress-thumb{transform:translate(-50%,-50%) scale(1.3);}
  .time-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px;font-variant-numeric:tabular-nums;}

  /* Global button press feedback */
  button:active:not(:disabled){
    opacity:0.6;transform:scale(0.96);
    transition:opacity 0s,transform 0s;
  }
  button{transition:opacity 0.25s,transform 0.25s;}

  .transport{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;}
  .tbtn{
    width:42px;height:42px;border-radius:50%;background:var(--cream-2);color:var(--navy);
    display:flex;align-items:center;justify-content:center;
  }
  .tbtn .icon{width:18px;height:18px;}
  .tbtn-skip{width:46px;height:46px;background:var(--cream-2);font-size:10px;font-weight:700;flex-direction:column;gap:1px;}
  .tbtn-skip .icon{width:16px;height:16px;}
  .tbtn-play{
    width:60px;height:60px;border-radius:50%;background:var(--navy);color:#fff;box-shadow:var(--shadow);
    display:flex;align-items:center;justify-content:center;
  }
  .tbtn-play .icon{width:24px;height:24px;stroke:#fff;}
  .tbtn:disabled,.tbtn-play:disabled{opacity:0.4;}

  .tools-row2{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;flex-wrap:wrap;}
  .chip{
    font-size:11.5px;font-weight:600;padding:6px 10px;border-radius:999px;background:var(--cream-2);color:var(--navy-soft);
    display:inline-flex;align-items:center;gap:4px;white-space:nowrap;
  }
  .chip .icon{width:13px;height:13px;}
  .chip.active{background:var(--navy);color:#fff;}
  /* Press feedback — instant colour on press, smooth fade back on release */
  .tbtn,.tbtn-play,.chip,.btn-soft,.back-btn,.nav-btn,.mini-btn{
    transition:background 0.25s ease,color 0.25s ease,opacity 0.25s ease;
  }
  .tbtn:active{background:var(--navy);color:#fff;transition:none;}
  .tbtn-play:active{opacity:0.65;transition:none;}
  .chip:active{background:var(--navy);color:#fff;transition:none;}
  .btn-soft:active,.back-btn:active{opacity:0.45;transition:none;}
  .mini-btn:active{background:rgba(255,255,255,0.45);transition:none;}
  .nav-btn:active{opacity:0.45;transition:none;}
  .chip-gold.active{background:var(--gold);color:#fff;}
  .chip-green.active{background:var(--green);color:#fff;}
  .divider-dot{width:3px;height:3px;border-radius:50%;background:var(--line-strong);margin:0 2px;}

  .shadow-banner{
    display:flex;align-items:center;justify-content:center;gap:8px;background:var(--green-soft);color:var(--green);
    font-size:12.5px;font-weight:600;padding:8px 10px;border-radius:11px;margin-bottom:10px;
  }
  .shadow-banner .icon{width:15px;height:15px;}
  .shadow-banner button{font-size:11.5px;text-decoration:underline;color:var(--green);font-weight:600;margin-left:4px;}

  /* ---------- Library ---------- */
  .lib-pad{padding:14px 16px calc(16px + var(--sab));}
  .lib-head{margin-bottom:14px;}
  .lib-head h1{font-size:20px;font-weight:700;}
  .lib-head p{font-size:12.5px;color:var(--muted);margin-top:2px;}

  .level-card{
    display:flex;align-items:center;gap:14px;padding:16px;background:var(--card);border-radius:var(--radius);
    box-shadow:var(--shadow-sm);margin-bottom:12px;border:1px solid var(--line);
  }
  .level-icon{
    width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .level-icon .icon{width:24px;height:24px;}
  .level-icon.elementary{background:var(--green-soft);}
  .level-icon.elementary .icon{color:var(--green);}
  .level-icon.intermediate{background:var(--gold-soft);}
  .level-icon.intermediate .icon{color:var(--gold);}
  .level-icon.upper_intermediate{background:var(--purple-soft);}
  .level-icon.upper_intermediate .icon{color:var(--purple);}
  .level-info{flex:1;min-width:0;}
  .level-name{font-size:16px;font-weight:700;}
  .level-tag{font-size:12px;color:var(--muted);margin-top:1px;}
  .level-count{font-size:12px;font-weight:600;color:var(--navy-soft);margin-top:5px;}
  .level-card .chev{width:18px;height:18px;color:var(--muted);flex-shrink:0;}

  .lib-list-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .back-btn{
    width:34px;height:34px;border-radius:10px;background:var(--card);border:1px solid var(--line-strong);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .back-btn .icon{width:17px;height:17px;}
  .lib-list-title{font-size:17px;font-weight:700;}
  .lib-list-meta{font-size:12px;color:var(--muted);}

  .ep-row{
    display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--card);border-radius:14px;
    margin-bottom:8px;border:1px solid var(--line);
  }
  .ep-row.current{border-color:var(--gold-line);background:var(--gold-soft);}
  .ep-index{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;width:22px;flex-shrink:0;text-align:right;}
  .ep-title{flex:1;min-width:0;font-size:14.5px;font-weight:600;line-height:1.35;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ep-status{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .ep-status .icon{width:14px;height:14px;}
  .ep-status.played{background:var(--green-soft);}
  .ep-status.played .icon{color:var(--green);stroke-width:2.4;}
  .ep-status.unplayed{background:var(--cream-2);}
  .ep-status.unplayed .icon{color:var(--muted);}

  /* ---------- Mini player ---------- */
  .mini-player{
    background:var(--navy);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px;
  }
  .mini-player.hidden{display:none;}
  .mini-info{flex:1;min-width:0;}
  .mini-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mini-sub{font-size:11px;color:rgba(255,255,255,0.6);margin-top:1px;}
  .mini-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.14);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .mini-btn .icon{width:15px;height:15px;stroke:#fff;}

  /* ---------- Bottom nav ---------- */
  .bottom-nav{
    display:flex;background:var(--card);border-top:1px solid var(--line);
    padding-bottom:var(--sab);
  }
  .nav-btn{
    flex:1;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--muted);position:relative;min-height:48px;justify-content:center;
  }
  .nav-btn .icon{width:21px;height:21px;}
  .nav-btn span{font-size:10px;font-weight:600;}
  .nav-btn.active{color:var(--navy);}
  .nav-btn.active .icon{stroke:var(--gold);color:var(--gold);}
  .nav-btn.active::after{
    content:"";position:absolute;top:1px;width:22px;height:2.5px;background:var(--gold);border-radius:2px;
  }

  .hidden{display:none !important;}
  .notice{
    position:fixed;left:14px;right:14px;bottom:calc(80px + var(--sab));z-index:50;
    background:var(--navy);color:#fff;padding:12px 16px;border-radius:13px;font-size:12.5px;line-height:1.5;
    box-shadow:0 14px 34px rgba(17,35,63,0.3);max-width:480px;margin:0 auto;
    white-space:pre-line;word-break:break-word;max-height:60vh;overflow-y:auto;
  }

  /* ---------- Selection-to-flashcard FAB ---------- */
  .selection-fab{
    position:fixed;left:14px;right:14px;bottom:calc(80px + var(--sab));z-index:55;
    display:none;justify-content:center;
  }
  .selection-fab.show{display:flex;}
  .selection-fab button{
    background:var(--green);color:#fff;border-radius:999px;padding:11px 20px;font-size:13.5px;font-weight:600;
    display:inline-flex;align-items:center;gap:7px;box-shadow:0 10px 28px rgba(15,110,86,0.35);
  }
  .selection-fab .icon{width:15px;height:15px;stroke:#fff;}

  /* ---------- Bottom sheet (add-card editor) ---------- */
  .sheet-backdrop{
    position:fixed;inset:0;background:rgba(17,35,63,0.45);z-index:90;
    display:flex;align-items:flex-end;justify-content:center;
  }
  .sheet{
    background:var(--cream);width:100%;max-width:480px;border-radius:20px 20px 0 0;
    padding:18px 16px calc(16px + var(--sab));max-height:88vh;overflow-y:auto;
    box-shadow:0 -10px 40px rgba(17,35,63,0.3);
  }
  .sheet-title{font-size:17px;font-weight:700;margin-bottom:14px;}
  .sheet label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin:12px 0 5px;}
  .sheet input[type=text],.sheet textarea{
    width:100%;border:1px solid var(--line-strong);border-radius:11px;padding:10px 12px;font-size:14.5px;
    background:var(--card);color:var(--navy);box-sizing:border-box;font-family:inherit;
  }
  .sheet textarea{min-height:110px;resize:vertical;line-height:1.5;}
  .context-quote{
    background:var(--gold-soft);border-left:3px solid var(--gold);border-radius:0 10px 10px 0;
    padding:9px 12px;font-size:13px;color:var(--navy-soft);font-style:italic;display:flex;align-items:flex-start;gap:8px;
  }
  .context-quote button{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;margin-top:1px;}
  .context-quote button .icon{width:12px;height:12px;stroke:#fff;}
  .chatgpt-row{display:flex;gap:8px;margin-top:12px;}
  .btn-soft{
    flex:1;background:var(--cream-2);color:var(--navy);border-radius:11px;padding:10px 8px;font-size:12.5px;font-weight:600;
    display:flex;align-items:center;justify-content:center;gap:6px;text-align:center;
  }
  .btn-soft .icon{width:14px;height:14px;}
  .sheet-actions{display:flex;gap:10px;margin-top:18px;}
  .sheet-actions button{flex:1;padding:12px;border-radius:12px;font-size:14.5px;font-weight:600;text-align:center;justify-content:center;}
  .sheet-cancel{background:var(--cream-2);color:var(--navy);}
  .sheet-save{background:var(--green);color:#fff;}
  .dict-status{font-size:12px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:6px;}

  /* ---------- Flashcards page ---------- */
  .flash-stats{display:flex;gap:10px;margin-bottom:4px;}
  .flash-stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 14px;}
  .flash-stat .n{font-size:22px;font-weight:700;}
  .flash-stat .l{font-size:11.5px;color:var(--muted);margin-top:1px;}
  .flash-empty{text-align:center;padding:48px 20px;color:var(--muted);}
  .flash-empty .icon{width:36px;height:36px;color:#cbd5e1;display:block;margin:0 auto 10px;}

  .flash-card{
    background:var(--card);border-radius:18px;border:1px solid var(--line);box-shadow:var(--shadow-sm);
    padding:26px 20px;text-align:center;margin-bottom:10px;min-height:130px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  }
  .flash-card.flipped{background:var(--green-soft);border-color:var(--green);}
  .flash-front{font-size:21px;font-weight:700;color:var(--navy);}
  .flash-back{font-size:14.5px;color:var(--navy-soft);line-height:1.65;white-space:pre-line;text-align:left;width:100%;}
  .flash-context{
    font-size:12px;color:var(--muted);font-style:italic;display:flex;align-items:center;gap:6px;
    justify-content:center;margin-top:4px;
  }
  .flash-context button{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--gold-soft);display:flex;align-items:center;justify-content:center;}
  .flash-context button .icon{width:11px;height:11px;color:var(--gold);}
  .flash-hint{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
  .rate-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:6px;}
  .rate-btn{padding:10px 0;border-radius:10px;font-size:12px;font-weight:600;}
  .rate-again{background:var(--gold-soft);color:var(--danger);}
  .rate-hard{background:var(--gold-soft);color:var(--gold);}
  .rate-good{background:var(--green-soft);color:var(--green);}
  .rate-easy{background:var(--purple-soft);color:var(--purple);}
  .flash-meta-row{display:flex;justify-content:space-between;align-items:center;padding:0 2px;margin-bottom:14px;}
  .flash-meta-row span{font-size:11px;color:var(--muted);}
  .flash-meta-row button{font-size:11px;color:var(--muted);text-decoration:underline;}
  .flash-fab{
    position:fixed;right:16px;bottom:calc(86px + var(--sab));z-index:40;
    width:48px;height:48px;border-radius:50%;background:var(--navy);box-shadow:var(--shadow);
    display:flex;align-items:center;justify-content:center;
  }
  .flash-fab .icon{width:20px;height:20px;stroke:#fff;}
</style>

  // ===================== Event handling =====================
  function onClick(e) {
    const a = e.target.closest("[data-action]");
    if (!a) return;
    const id = a.dataset.id;
    switch (a.dataset.action) {
      case "nav": state.view = a.dataset.view; renderAll(); break;
      case "lib-open-level": state.libraryLevel = a.dataset.level; renderAll(); break;
      case "lib-back": state.libraryLevel = null; renderAll(); break;
      case "open-episode": openEpisode(id); break;
      case "toggle-play": togglePlay(); break;
      case "prev": playRelative(-1); break;
      case "next": playRelative(1); break;
      case "skip-back": seekBy(-10); break;
      case "skip-forward": seekBy(10); break;
      case "set-speed": setSpeed(parseFloat(a.dataset.speed)); break;
      case "cue-seek": seekTo(parseFloat(a.dataset.time) || 0); break;
      case "shadow-toggle": shadowCurrentCue(); break;
      case "shadow-stop": clearShadowMode(); break;
      case "go-home": state.view = "home"; renderAll(); break;
      case "add-card-from-selection": addCardFromSelection(); break;
      case "add-card-manual": addCardManual(); break;
      case "add-card-cancel": closeCardDraft(); break;
      case "add-card-backdrop":
        if (!e.target.closest(".sheet")) closeCardDraft();
        break;
      case "add-card-save": saveCardDraft(); break;
      case "add-card-copy-prompt": copyPromptToClipboard(); break;
      case "add-card-open-chatgpt": openChatGpt(); break;
      case "play-context": playContextAt(a.dataset.episode, a.dataset.time); break;
      case "flash-tab": setFlashTab(a.dataset.tab); break;
      case "flash-flip": toggleFlashFlip(a.dataset.id); break;
      case "flash-rate": rateFlashcard(a.dataset.id, parseInt(a.dataset.q, 10)); break;
      case "flash-delete": deleteFlashcard(a.dataset.id); break;
    }
  }

  function onKeyDown(e) {
    if (["INPUT","TEXTAREA","SELECT"].includes(document.activeElement.tagName)) return;
    if (e.code === "Space") { e.preventDefault(); togglePlay(); }
    else if (e.code === "ArrowLeft") { e.preventDefault(); seekBy(-10); }
    else if (e.code === "ArrowRight") { e.preventDefault(); seekBy(10); }
  }

  // ===================== Audio engine =====================
  function wireAudio() {
    audio.addEventListener("loadedmetadata", () => {
      state.duration = Number.isFinite(audio.duration) ? audio.duration : 0;
      const saved = state.progress[state.currentId] || 0;
      const startAt = Math.min(saved, Math.max(0, state.duration - 0.2));
      if (startAt > 0) { audio.currentTime = startAt; state.currentTime = startAt; }
      audio.playbackRate = state.speed;
      syncTransport();
      if (state.pendingPlay) { state.pendingPlay = false; audio.play().catch(()=>{}); }
    });
    audio.addEventListener("timeupdate", () => {
      if (state.seeking) return;
      state.currentTime = audio.currentTime || 0;
      state.progress[state.currentId] = state.currentTime;
      if (state.currentTime > 3) state.played[state.currentId] = true;
      enforceShadowLoop();
      persistState(true);
      updateTimeOnly();
    });
    audio.addEventListener("play", () => { state.playing = true; audio.playbackRate = state.speed; syncTransport(); syncMediaSession(); });
    audio.addEventListener("pause", () => { state.playing = false; syncTransport(); syncMediaSession(); });
    audio.addEventListener("ended", () => {
      if (state.shadowMode && state.shadowCueIndex >= 0) {
        const cue = getCurrentEpisode()?.cues?.[state.shadowCueIndex];
        if (cue) { audio.currentTime = cue.start; audio.playbackRate = state.speed; audio.play().catch(()=>{}); return; }
      }
      state.playing = false;
      state.played[state.currentId] = true;
      persistState(true);
      syncTransport();
      if (state.autoNext) playRelative(1, { autoplay: true });
    });
    audio.addEventListener("error", () => {
      const next = state.candidateIndex + 1;
      if (next < state.candidateUrls.length) {
        state.candidateIndex = next;
        audio.src = state.candidateUrls[next];
        audio.load();
        if (state.playing || state.pendingPlay) audio.play().catch(()=>{});
        return;
      }
      const firstTried = state.candidateUrls[0] || "(no URL built)";
      const lastTried = state.candidateUrls[state.candidateUrls.length - 1] || firstTried;
      showNotice(`Could not load the audio file. Tried ${state.candidateUrls.length} paths, including:\n${firstTried}\n${lastTried}\nOpen the first link directly in Safari — if it 404s, check that ARCHIVE_IDENTIFIER in index.html matches your archive.org item.`);
    });
  }

  function wireMediaSession() {
    if (!("mediaSession" in navigator)) return;
    navigator.mediaSession.setActionHandler("play", () => togglePlay(true));
    navigator.mediaSession.setActionHandler("pause", () => togglePlay(false));
    navigator.mediaSession.setActionHandler("previoustrack", () => playRelative(-1, { autoplay:true }));
    navigator.mediaSession.setActionHandler("nexttrack", () => playRelative(1, { autoplay:true }));
    navigator.mediaSession.setActionHandler("seekbackward", d => seekBy(-(d.seekOffset || 10)));
    navigator.mediaSession.setActionHandler("seekforward", d => seekBy(d.seekOffset || 10));
    try {
      navigator.mediaSession.setActionHandler("seekto", d => {
        if (d.fastSeek && audio.fastSeek) audio.fastSeek(d.seekTime); else seekTo(d.seekTime);
      });
    } catch(e) {}
    syncMediaSession();
  }

  function syncMediaSession() {
    if (!("mediaSession" in navigator)) return;
    const cur = getCurrentEpisode();
    if (!cur) return;
    try {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: displayTitle(cur),
        artist: "Iman English Podcast",
        album: LEVEL_LABEL_SHORT[cur.levelKey] || "",
        artwork: [{ src: ARTWORK, sizes:"256x256", type:"image/png" }]
      });
      navigator.mediaSession.playbackState = state.playing ? "playing" : "paused";
      if (navigator.mediaSession.setPositionState && Number.isFinite(state.duration) && state.duration > 0) {
        navigator.mediaSession.setPositionState({
          duration: state.duration,
          playbackRate: state.speed,
          position: Math.min(state.currentTime, state.duration)
        });
      }
    } catch (e) {}
  }

  function togglePlay(force) {
    if (typeof force === "boolean") { force ? playCurrent() : pauseCurrent(); return; }
    state.playing ? pauseCurrent() : playCurrent();
  }
  function playCurrent() {
    const cur = getCurrentEpisode();
    if (!cur) return;
    ensureSource(cur);
    state.pendingPlay = true;
    audio.play().then(() => { state.playing = true; state.pendingPlay = false; syncTransport(); })
      .catch(() => { state.pendingPlay = false; });
  }
  function pauseCurrent() { state.pendingPlay = false; audio.pause(); state.playing = false; syncTransport(); }

  function seekTo(seconds) {
    const cur = getCurrentEpisode(); if (!cur) return;
    const next = Math.max(0, Math.min(seconds, state.duration || seconds));
    audio.currentTime = next; state.currentTime = next; state.progress[cur.id] = next;
    persistState(true); updateTimeOnly();
    if (state.playing && audio.paused) audio.play().catch(()=>{});
  }
  function seekBy(delta) { seekTo((audio.currentTime || 0) + delta); }

  function setSpeed(s) { state.speed = s; audio.playbackRate = s; persistState(); syncTransport(); }

  function playRelative(step, opts) {
    const queue = getQueue();
    const idx = Math.max(0, queue.findIndex(e => e.id === state.currentId));
    const next = queue[idx + step];
    if (!next) return;
    setCurrentEpisode(next.id, { autoplay: opts?.autoplay ?? state.playing });
  }

  function setCurrentEpisode(id, opts = {}) {
    const ep = findEpisode(id); if (!ep) return;
    state.currentId = ep.id;
    state.activeCueIndex = -1;
    state.shadowMode = false; state.shadowCueIndex = -1;
    state.currentTime = state.progress[ep.id] || 0;
    state.duration = 0;
    ensureSource(ep, { replace:true });
    loadTranscript(ep);
    renderAll();
    if (opts.autoplay) { state.pendingPlay = true; playCurrent(); } else { pauseCurrent(); }
  }

  function openEpisode(id) {
    setCurrentEpisode(id, { autoplay: true });
    state.view = "home";
    renderAll();
  }

  function shadowCurrentCue() {
    const cur = getCurrentEpisode();
    if (!cur || !cur.cues.length) { showNotice("No transcript loaded for this episode yet."); return; }
    if (state.shadowMode) { clearShadowMode(); return; }
    const idx = state.activeCueIndex >= 0 ? state.activeCueIndex : 0;
    const cue = cur.cues[idx];
    if (!cue) { showNotice("Play the episode first, then tap Shadow on the current line."); return; }
    state.shadowMode = true; state.shadowCueIndex = idx;
    seekTo(cue.start);
    renderAll();
    if (!state.playing) playCurrent();
  }
  function clearShadowMode() { state.shadowMode = false; state.shadowCueIndex = -1; renderAll(); }
  function enforceShadowLoop() {
    if (!state.shadowMode || state.shadowCueIndex < 0) return;
    const cue = getCurrentEpisode()?.cues?.[state.shadowCueIndex];
    if (!cue) return;
    const now = audio.currentTime || 0;
    if (now >= Math.max(cue.start, cue.end - 0.06)) {
      audio.currentTime = cue.start; state.currentTime = cue.start;
    }
  }

  // ===================== Flashcards =====================
  function findCueElement(node) {
    if (!node) return null;
    const el = node.nodeType === 1 ? node : node.parentElement;
    return el ? el.closest(".cue") : null;
  }

  let cachedSelection = null;
  function setupSelectionWatcher() {
    document.addEventListener("selectionchange", () => {
      if (state.view !== "home" || state.cardDraft) { hideSelectionFab(); return; }
      const sel = window.getSelection();
      const text = sel ? sel.toString().trim() : "";
      const transcript = document.getElementById("transcript");
      const inTranscript = !!(transcript && sel && sel.anchorNode && transcript.contains(sel.anchorNode));
      const fab = document.getElementById("selection-fab");
      if (text && inTranscript && text.length <= 200) {
        const cueEl = findCueElement(sel.anchorNode);
        let context = "", episodeId = "", time = 0;
        if (cueEl) {
          const idx = Number(cueEl.dataset.index);
          const cur = getCurrentEpisode();
          if (cur && cur.cues[idx]) { context = cur.cues[idx].text; episodeId = cur.id; time = cur.cues[idx].start; }
        }
        cachedSelection = { text, context, episodeId, time };
        if (fab) fab.classList.add("show");
      } else if (fab) {
        fab.classList.remove("show");
      }
    });
  }
  function hideSelectionFab() {
    const fab = document.getElementById("selection-fab");
    if (fab) fab.classList.remove("show");
  }

  function addCardFromSelection() {
    if (!cachedSelection) return;
    const { text, context, episodeId, time } = cachedSelection;
    cachedSelection = null;
    try { window.getSelection()?.removeAllRanges(); } catch(e) {}
    hideSelectionFab();
    openCardDraft({ front: text, context, episodeId, time });
  }

  function addCardManual() { openCardDraft({}); }

  function cleanWordForLookup(s) {
    return s.replace(/^[^a-zA-Z']+|[^a-zA-Z']+$/g, "");
  }

  function openCardDraft({ front = "", context = "", episodeId = "", time = 0 }) {
    const trimmedFront = front.trim();
    const lookupWord = cleanWordForLookup(trimmedFront);
    const isSingleWord = !!lookupWord && !/\s/.test(lookupWord);
    const draft = { front: trimmedFront, context, episodeId, time, back: "", loading: isSingleWord };
    state.cardDraft = draft;
    renderAll();
    if (isSingleWord) {
      fetchDictionaryDefinition(lookupWord).then(result => {
        if (state.cardDraft !== draft) return;
        draft.loading = false;
        const statusEl = document.querySelector(".dict-status");
        if (statusEl) statusEl.remove();
        if (result) {
          draft.back = result;
          const ta = document.getElementById("draft-back");
          if (ta && !ta.value.trim()) ta.value = result;
        }
      });
    }
  }

  function closeCardDraft() { state.cardDraft = null; renderAll(); }

  function syncDraftFromDOM() {
    if (!state.cardDraft) return;
    const frontEl = document.getElementById("draft-front");
    const backEl = document.getElementById("draft-back");
    if (frontEl) state.cardDraft.front = frontEl.value;
    if (backEl) state.cardDraft.back = backEl.value;
  }

  function saveCardDraft() {
    syncDraftFromDOM();
    const front = state.cardDraft.front.trim();
    const back = state.cardDraft.back.trim();
    if (!front) { showNotice("Add a word or phrase before saving."); return; }
    const d = state.cardDraft;
    state.flashcards.push({
      id: uid(), front, back,
      context: d.context || "", contextEpisodeId: d.episodeId || "", contextTime: d.time || 0,
      ef: 2.5, iv: 1, rp: 0, due: Date.now(), createdAt: Date.now()
    });
    persistState();
    state.cardDraft = null;
    renderAll();
    showNotice(`Saved "${front}" to Flashcards.`);
  }

  async function fetchDictionaryDefinition(word) {
    try {
      const res = await fetch("https://api.dictionaryapi.dev/api/v2/entries/en/" + encodeURIComponent(word.toLowerCase()));
      if (!res.ok) return null;
      const data = await res.json();
      const entry = data[0];
      if (!entry || !Array.isArray(entry.meanings)) return null;
      const lines = [];
      entry.meanings.slice(0, 2).forEach(m => {
        const def = m.definitions && m.definitions[0];
        if (!def) return;
        lines.push(`(${m.partOfSpeech}) ${def.definition}`);
        if (def.example) lines.push(`Example: "${def.example}"`);
      });
      return lines.length ? lines.join("\n") : null;
    } catch (e) { return null; }
  }

  function buildChatGptPrompt(front, context) {
    const sentencePart = context ? ` as used in this sentence: "${context}"` : "";
    return `Explain the English word/phrase "${front}"${sentencePart}.\n\nReply in exactly this format and nothing else:\n(formality tag, e.g. informal/slang/formal) one-line plain meaning\nExamples:\n- "example sentence" = plain-English meaning\n- "example sentence" = plain-English meaning\n- "example sentence" = plain-English meaning`;
  }

  function copyPromptToClipboard() {
    syncDraftFromDOM();
    const front = (state.cardDraft?.front || "").trim();
    const context = state.cardDraft?.context || "";
    if (!front) { showNotice("Add a word or phrase first."); return; }
    const prompt = buildChatGptPrompt(front, context);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(prompt)
        .then(() => showNotice("Prompt copied — paste it into ChatGPT, then paste the reply back here."))
        .catch(() => showNotice(prompt));
    } else {
      showNotice(prompt);
    }
  }

  function playContextAt(episodeId, time) {
    syncDraftFromDOM();
    if (!episodeId) { showNotice("No audio reference saved for this card."); return; }
    if (state.currentId !== episodeId) {
      if (!findEpisode(episodeId)) { showNotice("That episode is no longer in the library."); return; }
      setCurrentEpisode(episodeId, { autoplay: false });

    state.view = "home";

  function setFlashTab(tab) { state.flashTab = tab; renderAll(); }
  function toggleFlashFlip(id) { state.flashFlipped[id] = !state.flashFlipped[id]; renderAll(); }
  function rateFlashcard(id, q) {
    const c = state.flashcards.find(c => c.id === id);
    if (!c) return;
    Object.assign(c, sm2(c, q));
    state.flashFlipped[id] = false;
    persistState(); renderAll();
  }
  function deleteFlashcard(id) {
    state.flashcards = state.flashcards.filter(c => c.id !== id);
    delete state.flashFlipped[id];
    persistState(); renderAll();
  }

  function ensureSource(ep, opts = {}) {
    const urls = buildCandidateUrls(ep);
    state.candidateUrls = urls; state.candidateIndex = 0;
    const url = urls[0];
    if (!url) { showNotice("No audio path found for this episode in episodes-data.js."); return; }
    if (opts.replace || audio.src !== url) { audio.src = url; audio.load(); }
    audio.playbackRate = state.speed;
  }


  async function loadTranscript(ep) {
    if (!ep || !ep.transcriptPath || ep.cuesLoaded || ep.cuesLoading) return;
    ep.cuesLoading = true; ep.cuesError = false;
    // Primary: both archive.org path variants; fallback: relative paths
    const archiveCandidates = buildArchiveUrlCandidates(ep.transcriptPath);
    const relativePaths = candidatePaths(ep.transcriptPath).map(toResolvedUrl);
    // Also try without "Iman English Podcast/" prefix as a GitHub relative URL
    // so SRT files stored at repo root (Elementary/, Intermediate/, etc.) are found
    const _srtNorm = normalizePath(ep.transcriptPath);
    const _srtPrefix = "Iman English Podcast/";
    const noPrefixUrl = toResolvedUrl(_srtNorm.startsWith(_srtPrefix) ? _srtNorm.slice(_srtPrefix.length) : _srtNorm);
    const urls = [...new Set([...archiveCandidates, noPrefixUrl, ...relativePaths])];
    ep.cuesTriedUrls = urls;
    let text = null;
    for (const url of urls) {
      try {
        const r = await fetch(url);
        if (r.ok) { text = await r.text(); break; }
      } catch (e) { /* network error — try next candidate */ }
    }
    if (text !== null) {
      ep.cues = parseSrt(text); ep.cuesLoaded = true; ep.cuesLoading = false;
    } else {
      ep.cuesLoading = false; ep.cuesError = true;
    }
    if (getCurrentEpisode()?.id === ep.id) renderAll();
  }

  // ---------- Path resolution (GitHub Pages + Internet Archive hosting) ----------
  function toArchiveUrl(path) {
    return ARCHIVE_BASE + normalizePath(path).split("/").map(encodeURIComponent).join("/");
  }
  function buildArchiveUrlCandidates(path) {
    // Returns archive.org candidates in order:
    //   1. Full path:    "Iman English Podcast/Elementary/001.m4a"
    //   2. No prefix:    "Elementary/001.m4a"
    //   3. Filename only: "001.m4a"  ← ia CLI uploads files flat to root
    const norm = normalizePath(path);
    const encode = p => ARCHIVE_BASE + p.split("/").map(encodeURIComponent).join("/");
    const urls = [];
    urls.push(encode(norm));
    const PREFIX = "Iman English Podcast/";
    const noPrefix = norm.startsWith(PREFIX) ? norm.slice(PREFIX.length) : norm;
    if (noPrefix !== norm) urls.push(encode(noPrefix));
    const filename = norm.split("/").pop();
    if (filename !== noPrefix) urls.push(ARCHIVE_BASE + encodeURIComponent(filename));
    return urls;
  }
  function buildCandidateUrls(ep) {
    const list = []; const seen = new Set();
    // Primary: both archive.org path variants
    for (const url of buildArchiveUrlCandidates(ep.audioPath)) {
      if (!seen.has(url)) { seen.add(url); list.push(url); }
    }
    // Fallback: relative paths (useful for local development)
    for (const p of candidatePaths(ep.audioPath)) {
      const url = toResolvedUrl(normalizePath(p));
      if (!seen.has(url)) { seen.add(url); list.push(url); }
    }
    return list;
  }
  function candidatePaths(path) {
    const norm = normalizePath(path);
    const stripped = norm.replace(/^Iman English Podcast\//, "");
    const lowerLevel = stripped.replace(/^(Elementary|Intermediate|Upper Intermediate)\//i, m => m.toLowerCase());
    const fullyLower = stripped.toLowerCase();
    const variants = [norm, stripped, lowerLevel, fullyLower];
    const all = [];
    for (const v of variants) all.push(v, `./${v}`);
    return [...new Set(all)];
  }
  function toResolvedUrl(path) { return new URL(path, document.baseURI).href; }
  function normalizePath(p) { return String(p||"").replace(/\\/g,"/").replace(/^\.\/+/,"").replace(/\/+/g,"/"); }

  // ===================== Rendering =====================
  function renderAll() {
    app.innerHTML = [
      '<div class="shell">',
      renderHeader(),
      `<main class="main ${state.view==='home' ? 'no-scroll' : ''}" id="view-root"></main>`,
      renderMini(),
      renderNav(),
      '<div class="selection-fab" id="selection-fab"><button data-action="add-card-from-selection">' + ICONS.plus + ' Add to Flashcards</button></div>',
      state.cardDraft ? renderCardDraftSheet() : '',
      '</div>'
    ].join("");
    document.getElementById("view-root").innerHTML =
      state.view === "library" ? renderLibrary() :
      state.view === "flashcards" ? renderFlashcards() : renderHome();
    cacheRefs();
    syncTransport();
    syncMediaSession();
  }

      `  <button class="mini-btn" data-action="toggle-play" onclick="event.stopPropagation()">${state.playing ? ICONS.pause : ICONS.play}</button>`,

  function renderHome() {

  function renderTranscriptPane(cur) {
    if (cur.cuesLoading) {

    }

      return `<div class="transcript-wrap"><div class="empty-pane">${ICONS.book}No transcript found for this episode.<br>The app tried:<br><code style="font-size:11px;word-break:break-all;display:inline-block;margin-top:6px;color:var(--navy-soft);">${esc(tried)}</code><br><span style="display:inline-block;margin-top:8px;">Open that link directly in Safari — if it 404s, check that ARCHIVE_IDENTIFIER in index.html matches your archive.org item.</span></div></div>`;
    }
    return [

  function renderFlashcards() {
    const all = state.flashcards;

    return [
      '<div class="lib-pad">',
      '  <div class="lib-head" style="display:flex;justify-content:space-between;align-items:flex-end;">',
      '    <div><h1>Flashcards</h1><p>' + due.length + ' due &middot; ' + all.length + ' total</p></div>',
      '  </div>',
      '  <div style="display:flex;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:3px;margin-bottom:14px;">',
      `    <button data-action="flash-tab" data-tab="due" style="flex:1;padding:8px;border-radius:8px;font-size:12.5px;font-weight:600;background:${state.flashTab==='due'?'var(--navy)':'transparent'};color:${state.flashTab==='due'?'#fff':'var(--navy-soft)'};">Due (${due.length})</button>`,
      `    <button data-action="flash-tab" data-tab="all" style="flex:1;padding:8px;border-radius:8px;font-size:12.5px;font-weight:600;background:${state.flashTab==='all'?'var(--navy)':'transparent'};color:${state.flashTab==='all'?'#fff':'var(--navy-soft)'};">All (${all.length})</button>`,
      '  </div>',
      shown.length === 0 ? renderFlashEmpty() : shown.map(c => renderFlashCard(c)).join(""),
      '  <div style="height:70px;"></div>',
      '</div>',
      `<button class="flash-fab" data-action="add-card-manual">${ICONS.plus}</button>`
    ].join("");
  }

  function renderFlashEmpty() {
    if (state.flashTab === "due" && state.flashcards.length > 0) {
      return `<div class="flash-empty">${ICONS.check}<div>All caught up — nothing due right now.</div></div>`;
    }
    return `<div class="flash-empty">${ICONS.layers}<div>No flashcards yet.<br>Select a word or phrase in any transcript while listening, or tap + to add one manually.</div></div>`;
  }

  function renderFlashCard(c) {
    const flipped = !!state.flashFlipped[c.id];
    const due = c.due <= Date.now();
    return [
      `<div class="flash-card${flipped?' flipped':''}" data-action="flash-flip" data-id="${escAttr(c.id)}">`,
      flipped ? [
        `<div class="flash-back">${esc(c.back || "(no definition saved)")}</div>`,
        c.context ? `<div class="flash-context"><button data-action="play-context" data-episode="${escAttr(c.contextEpisodeId||'')}" data-time="${c.contextTime||0}" onclick="event.stopPropagation()">${ICONS.play}</button> "${esc(c.context)}"</div>` : ''
      ].join("") : [
        `<div class="flash-front">${esc(c.front)}</div>`,
        `<div class="flash-hint">Tap to reveal</div>`
      ].join(""),
      '</div>',
      flipped ? [
        '<div class="rate-row">',
        `  <button class="rate-btn rate-again" data-action="flash-rate" data-id="${escAttr(c.id)}" data-q="1">Again</button>`,
        `  <button class="rate-btn rate-hard" data-action="flash-rate" data-id="${escAttr(c.id)}" data-q="3">Hard</button>`,
        `  <button class="rate-btn rate-good" data-action="flash-rate" data-id="${escAttr(c.id)}" data-q="4">Good</button>`,
        `  <button class="rate-btn rate-easy" data-action="flash-rate" data-id="${escAttr(c.id)}" data-q="5">Easy</button>`,
        '</div>',
        `<div class="flash-meta-row"><span>${c.rp ? 'Reviewed ' + c.rp + 'x' : 'New card'}${due ? '' : ' &middot; due ' + new Date(c.due).toLocaleDateString()}</span><button data-action="flash-delete" data-id="${escAttr(c.id)}">Delete</button></div>`
      ].join("") : ''
    ].join("");
  }

  function renderCardDraftSheet() {
    const d = state.cardDraft;
    return [
      '<div class="sheet-backdrop" data-action="add-card-backdrop">',
      '  <div class="sheet">',
      '    <div class="sheet-title">Add Flashcard</div>',
      '    <label>Word or phrase</label>',
      `    <input type="text" id="draft-front" value="${escAttr(d.front)}">`,
      d.context ? [
        '<label>From this sentence</label>',
        `<div class="context-quote"><button data-action="play-context" data-episode="${escAttr(d.episodeId||'')}" data-time="${d.time||0}">${ICONS.play}</button><span>"${esc(d.context)}"</span></div>`
      ].join("") : "",
      '    <label>Definition &amp; examples</label>',
      `    <textarea id="draft-back" placeholder="Auto-looked-up definitions appear here, or paste ChatGPT's answer.">${esc(d.back)}</textarea>`,
      d.loading ? `<div class="dict-status">${ICONS.refresh} Looking up definition…</div>` : "",
      '    <div class="chatgpt-row">',
      `      <button class="btn-soft" data-action="add-card-copy-prompt">${ICONS.copy} Copy ChatGPT prompt</button>`,
      `      <button class="btn-soft" data-action="add-card-open-chatgpt">${ICONS.external} Open ChatGPT</button>`,
      '    </div>',
      '    <div class="sheet-actions">',
      `      <button class="sheet-cancel" data-action="add-card-cancel">Cancel</button>`,
      `      <button class="sheet-save" data-action="add-card-save">Save card</button>`,
      '    </div>',
      '  </div>',
      '</div>'
    ].join("");
  }


  // ===================== Sync helpers (avoid full re-render on tick) =====================
  function cacheRefs() {
    ui.progressFill = document.getElementById("progress-fill");
    ui.progressThumb = document.getElementById("progress-thumb");
    ui.elapsed = document.getElementById("t-elapsed");
    ui.duration = document.getElementById("t-duration");
    ui.playBtn = document.getElementById("play-btn");
    ui.transcript = document.getElementById("transcript");
    wireProgressBar();
  }

  function wireProgressBar() {
    const track = document.querySelector(".progress-track");
    if (!track) return;
    let scrubbing = false;
    function scrubAt(clientX) {
      const rect = track.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      const t = ratio * (state.duration || 0);
      state.currentTime = t;
      if (ui.progressFill) ui.progressFill.style.width = (ratio * 100) + "%";
      if (ui.progressThumb) ui.progressThumb.style.left = (ratio * 100) + "%";
      if (ui.elapsed) ui.elapsed.textContent = fmtT(t);
    }
    function commitScrub(clientX) {
      const rect = track.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      seekTo(ratio * (state.duration || 0));
      scrubbing = false;
      track.classList.remove("scrubbing");
    }
    // Touch events
    track.addEventListener("touchstart", e => {
      e.preventDefault();
      scrubbing = true;
      track.classList.add("scrubbing");
      scrubAt(e.touches[0].clientX);
    }, { passive: false });
    track.addEventListener("touchmove", e => {
      if (!scrubbing) return;
      e.preventDefault();
      scrubAt(e.touches[0].clientX);
    }, { passive: false });
    track.addEventListener("touchend", e => {
      if (!scrubbing) return;
      e.preventDefault();
      commitScrub(e.changedTouches[0].clientX);
    }, { passive: false });
    // Mouse events (for desktop/iPad with mouse)
    track.addEventListener("mousedown", e => {
      scrubbing = true;
      track.classList.add("scrubbing");
      scrubAt(e.clientX);
    });
    window.addEventListener("mousemove", e => { if (scrubbing) scrubAt(e.clientX); });
    window.addEventListener("mouseup", e => { if (scrubbing) commitScrub(e.clientX); });
  }

  function syncTransport() {
    if (ui.elapsed) ui.elapsed.textContent = fmtT(state.currentTime);
    if (ui.duration) ui.duration.textContent = fmtT(state.duration);
    if (ui.progressFill || ui.progressThumb) {
      const pct = state.duration > 0 ? Math.min(100,Math.max(0,(state.currentTime/state.duration)*100)) : 0;
      if (ui.progressFill) ui.progressFill.style.width = pct + "%";
      if (ui.progressThumb) ui.progressThumb.style.left = pct + "%";
    }
    if (ui.playBtn) ui.playBtn.innerHTML = state.playing ? ICONS.pause : ICONS.play;
    const miniBtn = document.querySelector(".mini-btn");
    if (miniBtn) miniBtn.innerHTML = state.playing ? ICONS.pause : ICONS.play;
    // Keep speed chip active state in sync without a full re-render
    document.querySelectorAll('[data-action="set-speed"]').forEach(btn => {
      btn.classList.toggle("active", parseFloat(btn.dataset.speed) === state.speed);
    });
  }
  function updateTimeOnly() {
    syncTransport();
    const cur = getCurrentEpisode();
    if (!cur) return;
    const idx = findCueIndex(cur, state.currentTime);
    if (idx !== state.activeCueIndex) {
      state.activeCueIndex = idx;
      if (ui.transcript) {
        ui.transcript.querySelectorAll(".cue").forEach(node => {
          const isActive = Number(node.dataset.index) === idx;
          node.classList.toggle("active", isActive && !(state.shadowMode));
          if (isActive && state.view === "home") {
            node.scrollIntoView({ block:"center", behavior:"smooth" });
          }
        });
      }
    }
  }

  // ===================== Utilities =====================
  function getCurrentEpisode() { return findEpisode(state.currentId); }
  function findEpisode(id) { return episodes.find(e => e.id === id) || null; }
  function getQueue() {
    return episodes.slice().sort((a,b) => {
      const la = levelOrder.indexOf(a.levelKey), lb = levelOrder.indexOf(b.levelKey);
      if (la !== lb) return la - lb;
      const oa = Number.isFinite(a.order) ? a.order : 1e9, ob = Number.isFinite(b.order) ? b.order : 1e9;
      return oa - ob;
    });
  }
  function findCueIndex(ep, t) {
    const cues = ep.cues || []; let found = -1;
    for (let i=0;i<cues.length;i++) { if (t >= cues[i].start) found = i; else break; }
    return found;
  }
  function displayTitle(ep) { return String(ep?.displayTitle || ep?.title || "").replace(/^\d{3}\s*-\s*/, ""); }
  function showNotice(msg) {
    const old = document.querySelector(".notice"); if (old) old.remove();
    const el = document.createElement("div"); el.className = "notice"; el.textContent = msg;
    el.style.userSelect = "text"; el.style.webkitUserSelect = "text";
    el.addEventListener("click", () => el.remove());
    document.body.appendChild(el);
    setTimeout(() => { if (el.isConnected) el.remove(); }, 12000);
  }
  function esc(s) { return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function escAttr(s) { return esc(s).replace(/`/g,"&#96;"); }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function sm2(card, q) {
    const ef = card.ef ?? 2.5, iv = card.iv ?? 1, rp = card.rp ?? 0;
    if (q < 3) return { ef, iv: 1, rp: 0, due: Date.now() + 86400000 };
    const niv = rp === 0 ? 1 : rp === 1 ? 6 : Math.round(iv * ef);
    return {
      ef: Math.max(1.3, ef + 0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)),
      iv: niv, rp: rp + 1, due: Date.now() + niv * 86400000
    };
  }
  function fmtT(v) {
    const s = Math.max(0, Number(v)||0); const whole = Math.floor(s+0.0001);
    const h = Math.floor(whole/3600), m = Math.floor((whole%3600)/60), sec = whole%60;
    return h>0 ? `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}` : `${m}:${String(sec).padStart(2,"0")}`;
  }
  function parseSrt(text) {
    const norm = String(text||"").replace(/\r/g,"").trim();
    if (!norm) return [];
    return norm.split(/\n{2,}/).map(block => {
      const lines = block.split("\n").map(l=>l.trimEnd()).filter(Boolean);
      if (!lines.length) return null;
      let timeLine = lines[0], body = lines.slice(1);
      if (/^\d+$/.test(lines[0]) && lines[1]) { timeLine = lines[1]; body = lines.slice(2); }
      const m = timeLine.match(/(\d\d):(\d\d):(\d\d),(\d\d\d)\s*-->\s*(\d\d):(\d\d):(\d\d),(\d\d\d)/);
      if (!m) return null;
      return { start: toSec(m[1],m[2],m[3],m[4]), end: toSec(m[5],m[6],m[7],m[8]), text: body.join(" ").trim() };
    }).filter(Boolean);
  }
  function toSec(h,m,s,ms) { return (+h*3600)+(+m*60)+(+s)+(+ms/1000); }

  function persistState(light) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        view: state.view, libraryLevel: state.libraryLevel, currentId: state.currentId,
        speed: state.speed, autoNext: state.autoNext,
        progress: state.progress, played: state.played,
        flashcards: state.flashcards
      }));
    } catch(e) {}
    if (!light) syncTransport();
  }
  function restoreState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY); if (!raw) return;
      const p = JSON.parse(raw);
      if (p && typeof p === "object") {
        Object.assign(state, {
          view: p.view === "library" ? "library" : (p.view === "flashcards" ? "flashcards" : "home"),
          libraryLevel: p.libraryLevel || null,
          currentId: p.currentId || state.currentId,
          speed: Number(p.speed) || 1,
          autoNext: typeof p.autoNext === "boolean" ? p.autoNext : true,
          progress: p.progress && typeof p.progress === "object" ? p.progress : {},
          played: p.played && typeof p.played === "object" ? p.played : {},
          flashcards: Array.isArray(p.flashcards) ? p.flashcards : []
        });
      }
    } catch(e) {}
  }
})();
</script>
